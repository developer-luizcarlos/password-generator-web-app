<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./src/styles/main.css" />
    <script type="module" src="./dist/bundle.js"></script>
  </head>
  <body>
    <dialog class="notification" id="notification" popover>
      <p class="notification__msg"></p>
      <div class="btn-notification-container">
        <button
          class="btn btn--notification"
          popovertarget="notification"
          popovertargetaction="hide"
        >
          OK
        </button>
      </div>
    </dialog>
    <article class="generator">
      <h1 class="title">Password Generator</h1>
      <div class="output-container">
        <output class="output-generated-password"></output>
        <button class="btn btn--copy">Copy</button>
      </div>
      <div class="options-container">
        <div class="option">
          <label for="input-quantity" class="label">Character quantity</label>
          <input
            type="text"
            maxlength="2"
            value="4"
            class="input input--quantity"
            id="input-quantity"
          />
        </div>
        <div class="option">
          <label for="checkbox-symbols" class="label">Include symbols</label>
          <div class="toggle">
            <div class="toggle__thumb"></div>
            <input
              type="checkbox"
              class="toggle__checkbox toggle__checkbox--symbols"
              id="checkbox-symbols"
            />
          </div>
        </div>
        <div class="option">
          <label for="checkbox-numbers" class="label">Include numbers</label>
          <div class="toggle">
            <div class="toggle__thumb"></div>
            <input
              type="checkbox"
              class="toggle__checkbox toggle__checkbox--numbers"
              id="checkbox-numbers"
            />
          </div>
        </div>
        <div class="option">
          <label for="checkbox-lowercase" class="label"
            >Include lowercase letters</label
          >
          <div class="toggle">
            <div class="toggle__thumb"></div>
            <input
              type="checkbox"
              class="toggle__checkbox toggle__checkbox--lowercase"
              id="checkbox-lowercase"
            />
          </div>
        </div>
        <div class="option">
          <label for="checkbox-uppercase" class="label"
            >Include uppercase letters</label
          >
          <div class="toggle">
            <div class="toggle__thumb"></div>
            <input
              type="checkbox"
              class="toggle__checkbox toggle__checkbox--uppercase"
              id="checkbox-uppercase"
            />
          </div>
        </div>
      </div>
      <button class="btn btn--generate">Generate Password</button>
    </article>
    <a
      href="https://github.com/developer-luizcarlos"
      referrerpolicy="no-referrer"
      target="_blank"
      class="anchor"
      >Check all my projects on <i class="fa-brands fa-github"></i>GitHub</a
    >
  </body>
</html>
